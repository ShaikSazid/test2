name: Test Workflow

on:
    push:
        branches:
            - main

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            # 1. Checkout Code
            - name: Checkout Code
              uses: actions/checkout@v3

            # 2. Login to Docker Hub
            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            # 3. Build Docker Image
            - name: Build Docker Image
              run: docker build -t shaiksazid/my-app:latest ./backend

            - name: Push Docker Image
              run: docker push shaiksazid/my-app:latest

            # 4. Deploy to EC2
            - name: Deploy to EC2
              uses: appleboy/ssh-action@v0.1.10
              with:
                host: ${{ secrets.EC2_HOST }}
                username: ubuntu
                key: ${{ secrets.EC2_SSH_KEY }}
                script: |
                  docker pull shaiksazid/my-app:latest
                  docker stop my-app || true
                  docker rm my-app || true
                  docker run -d -p 80:8080 --name my-app shaiksazid/my-app:latest

            # 5. Print message
            - name: Print message
              run: echo "Container ran and all worked"